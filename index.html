<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>השעון המשפחתי — קישור אחד</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap");
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:"Assistant",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#eef7ff,#e5f1ff);color:#173653}
button,input{font:inherit}
button{cursor:pointer;border:0}
.shell{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
.topbar{position:sticky;top:0;z-index:10;background:rgba(251,253,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid #cce2f7;box-shadow:0 10px 30px rgba(52,105,150,.12);padding:12px 16px}
.toprow{max-width:1500px;margin:0 auto;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:1000}
.badge{background:#e3f3ff;border:1px solid #cce2f7;border-radius:999px;padding:7px 12px;font-size:16px;font-weight:900;color:#4d6e8e;direction:ltr}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.btn{border-radius:18px;padding:12px 18px;font-size:19px;font-weight:1000;background:#e4f3ff;color:#173653;display:inline-flex;align-items:center;gap:8px}
.btn.active{background:#3f84b8;color:white}
.btn.voice{background:#fff4d7;color:#173653;border:2px solid #f3c85f}
.btn.soft{background:#f4faff;color:#173653;border:1px solid #cce2f7}
iframe{width:100%;height:calc(100vh - 76px);border:0;display:block;background:white}
.portal{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 82% 8%,rgba(200,230,255,.9),transparent 36%),radial-gradient(circle at 8% 88%,rgba(219,241,255,.9),transparent 34%),linear-gradient(135deg,#eef7ff,#e5f1ff)}
.portalBox{width:min(980px,96vw);background:rgba(251,253,255,.98);border:1px solid #cce2f7;border-radius:44px;padding:30px;box-shadow:0 22px 55px rgba(52,105,150,.14)}
.portalBox h1{font-size:clamp(44px,6vw,76px);line-height:1.05;margin:0 0 16px;font-weight:1000}
.portalBox p{font-size:clamp(22px,2.6vw,32px);line-height:1.4;color:#4d6e8e;font-weight:850}
.portalSteps{display:grid;gap:14px;margin:20px 0}
.portalStep{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;background:#f4faff;border:2px solid #cce2f7;border-radius:24px;padding:16px}
.portalNum{width:46px;height:46px;border-radius:16px;background:#4a8fca;color:white;display:grid;place-items:center;font-size:24px;font-weight:1000}
.portalStep strong{display:block;font-size:25px;margin-bottom:4px}
.portalStep span{font-size:21px;color:#4d6e8e;font-weight:800;line-height:1.35}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
.card{background:#f4faff;border:2px solid #cce2f7;border-radius:30px;padding:22px}
.card h2{font-size:32px;margin:0 0 10px;font-weight:1000}
.card input{width:100%;border:2px solid #cce2f7;border-radius:18px;padding:14px;font-size:22px;margin-top:10px;background:white;color:#173653}
.bigBtn{width:100%;margin-top:14px;font-size:26px!important;padding:18px!important;background:#4a8fca;color:white;border-radius:20px;font-weight:1000}
.green{background:#3f84b8;color:white}
.ownerMissing{background:#fff0ed;border:2px solid #ffc8bb;color:#7a2c23;border-radius:26px;padding:18px;margin-top:18px;font-size:22px;line-height:1.4;font-weight:900}
.small{margin-top:18px;font-size:17px;color:#4d6e8e;font-weight:800}
@media(max-width:850px){.cards{grid-template-columns:1fr}iframe{height:calc(100vh - 128px)}}

.homeHelp{
  position:fixed;
  inset:0;
  z-index:200;
  display:grid;
  place-items:center;
  padding:22px;
  background:rgba(15,36,55,.42);
  backdrop-filter:blur(8px);
}
.homeHelpBox{
  width:min(760px,94vw);
  background:#fbfdff;
  color:#173653;
  border:2px solid #cce2f7;
  border-radius:34px;
  padding:26px;
  box-shadow:0 30px 80px rgba(52,105,150,.25);
  text-align:center;
}
.homeHelpBox h2{
  margin:0 0 12px;
  font-size:clamp(32px,5vw,54px);
  font-weight:1000;
}
.homeHelpBox p{
  font-size:clamp(21px,3vw,30px);
  line-height:1.35;
  font-weight:850;
  color:#4d6e8e;
}
.homeHelpGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.homeHelpCard{
  background:#f4faff;
  border:2px solid #cce2f7;
  border-radius:24px;
  padding:16px;
}
.homeHelpIcon{font-size:54px}
.homeHelpCard strong{display:block;font-size:23px;margin-top:8px}
.homeHelpCard span{display:block;font-size:18px;color:#4d6e8e;font-weight:850;margin-top:6px}
@media(max-width:760px){.homeHelpGrid{grid-template-columns:1fr}}

</style>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#3f84b8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="השעון המשפחתי">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" href="./favicon.ico" sizes="any">
</head>
<body>
<div id="app"></div>
<script>
const OWNER_APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbz21NkWRs7yqe5ao_VwEVzURXGn_2IVSwzOQINumgHk48-S0C2XW5PeOyeqeCJcdS-K/exec';
const OWNER_DEFAULT_POLL_MS=60000;
const ONE_LINK_BOARD_KEY="family_clock_board_v4";
const ONE_LINK_MODE_KEY="family_clock_mode_v4";
const HOME_HELP_KEY="family_clock_home_help_seen_v2";

function hasOwnerCloud(){return !!OWNER_APPS_SCRIPT_URL}
function getParams(){return new URLSearchParams(location.search)}
function currentBoard(){return getParams().get("board")||localStorage.getItem(ONE_LINK_BOARD_KEY)||""}
function currentMode(){return getParams().get("mode")||localStorage.getItem(ONE_LINK_MODE_KEY)||"patient"}
function currentTab(){return getParams().get("tab")||""}
function normalizeFamilyName(name){
  name=String(name||"").trim();
  if(!name)return "family";
  return name.replace(/[^\u0590-\u05FFa-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,24)||"family";
}
function randomBoardId(){
  const arr=new Uint8Array(12);
  crypto.getRandomValues(arr);
  const prefix=normalizeFamilyName(document.getElementById("newFamilyName")?.value||"family");
  return prefix+"-"+[...arr].map(b=>b.toString(16).padStart(2,"0")).join("").slice(0,16);
}
function setTopUrl(board,mode,tab=""){
  localStorage.setItem(ONE_LINK_BOARD_KEY,board);
  localStorage.setItem(ONE_LINK_MODE_KEY,mode);
  const url=new URL(location.href);
  url.searchParams.set("board",board);
  url.searchParams.set("mode",mode);
  if(tab)url.searchParams.set("tab",tab); else url.searchParams.delete("tab");
  history.replaceState(null,"",url.toString());
}
function oneLink(board){
  const url=new URL(location.href);
  return url.origin+url.pathname+"?board="+encodeURIComponent(board);
}
function modeUrl(board,mode,tab=""){
  const url=new URL(location.href);
  url.searchParams.set("board",board);
  url.searchParams.set("mode",mode);
  if(tab)url.searchParams.set("tab",tab); else url.searchParams.delete("tab");
  url.searchParams.set("v","calm-render-fix-v15");
  return url.pathname+url.search;
}
function frameSrc(mode,board,tab=""){
  const base=mode==="backoffice"?"./backoffice/":"./patient.html";
  const params=new URLSearchParams();
  params.set("board",board);
  if(tab)params.set("tab",tab);
  params.set("v","calm-render-fix-v15");
  return base+"?"+params.toString();
}
function loadFrame(mode,tab=""){
  const board=currentBoard();
  if(!board)return render();
  setTopUrl(board,mode,tab);
  const f=document.getElementById("screenFrame");
  if(f)f.src=frameSrc(mode,board,tab);
  document.querySelectorAll("[data-mode-btn]").forEach(b=>b.classList.toggle("active", b.dataset.modeBtn===mode));
  document.querySelectorAll("[data-voice-btn]").forEach(b=>b.classList.toggle("active", !!tab && tab==="voice"));
}

function hardModeUrl(mode,tab=""){
  const board=currentBoard();
  const url=new URL(location.href);
  url.searchParams.set("board",board);
  url.searchParams.set("mode",mode);
  if(tab)url.searchParams.set("tab",tab); else url.searchParams.delete("tab");
  url.searchParams.set("v","calm-render-fix-v15");
  return url.toString();
}
function hardOpenVoice(){
  location.href=hardModeUrl("backoffice","voice");
}
function hardOpenBackoffice(){
  location.href=hardModeUrl("backoffice","");
}
function hardOpenPatient(){
  location.href=hardModeUrl("patient","");
}

function openMode(mode){loadFrame(mode,"")}
function openVoice(){loadFrame("backoffice","voice")}
async function copyOneLink(){
  const board=currentBoard();
  const text=oneLink(board);
  try{await navigator.clipboard.writeText(text);alert("הקישור הועתק ✅")}
  catch{prompt("העתיקו את הקישור:",text)}
}
function sendWhatsappInvite(){
  const board=currentBoard();
  if(!board)return alert("צריך קודם ליצור לוח משפחתי");
  const link=oneLink(board);
  const text=encodeURIComponent(
    `שלום! יצרתי עבורנו את "השעון המשפחתי".\n\n`+
    `לא צריך להוריד שום דבר, לא צריך לפתוח חשבון ולא צריך סיסמה.\n`+
    `זה פשוט דף אינטרנט: לוחצים על הקישור והוא נפתח מיד:\n${link}\n\n`+
    `מאותו קישור אפשר לראות את השעון המשפחתי ולעדכן תמונות, הודעות ושגרה.`
  );
  window.open(`https://wa.me/?text=${text}`,"_blank");
}
function createBoard(){
  if(!hasOwnerCloud())return render();
  const id=randomBoardId();
  localStorage.setItem(ONE_LINK_BOARD_KEY,id);
  render();
  setTimeout(()=>openMode("backoffice"),50);
}
function joinBoard(){
  let value=(document.getElementById("joinBoardInput")?.value||"").trim();
  if(!value)return alert("צריך להדביק קישור או Family ID");
  try{
    if(value.includes("http")||value.includes("?")){
      const u=new URL(value);
      value=u.searchParams.get("board")||value;
    }
  }catch(e){}
  if(!value)return alert("לא נמצא Family ID");
  localStorage.setItem(ONE_LINK_BOARD_KEY,value);
  render();
  setTimeout(()=>openMode("backoffice"),50);
}
function portal(){
  const missing=!hasOwnerCloud();
  return `<main class="portal"><div class="portalBox"><h1>השעון המשפחתי</h1><p>לא צריך לפתוח חשבון, לא צריך סיסמה, ולא צריך להוריד שום דבר. זה פשוט דף אינטרנט משפחתי: פותחים קישור אחד, ומשם עוברים בלחיצה בין השעון של המטופל/ת לבין ניהול המשפחה.</p>${missing?`<div class="ownerMissing">הגדרת מנהלת האתר חסרה: צריך להדביק פעם אחת את כתובת Google Apps Script בתוך OWNER_APPS_SCRIPT_URL.</div>`:""}<div class="portalSteps"><div class="portalStep"><div class="portalNum">1</div><div><strong>כתבו שם משפחה או שם מטופל/ת</strong><span>זה רק כדי שיהיה קל לזהות את הלוח.</span></div></div><div class="portalStep"><div class="portalNum">2</div><div><strong>לחצו יצירת לוח</strong><span>המערכת תיצור Family ID ארוך וייחודי.</span></div></div><div class="portalStep"><div class="portalNum">3</div><div><strong>שמרו קישור אחד</strong><span>אותו קישור עובד גם לתצוגת המטופל/ת וגם לניהול.</span></div></div></div><div class="cards"><div class="card"><h2>יצירת שעון משפחתי חדש</h2><p>מתאים למשפחה שמתחילה עכשיו.</p><input id="newFamilyName" placeholder="שם משפחה / שם המטופלת"><button type="button" class="bigBtn" onclick="createBoard()" ${missing?"disabled":""}>יצירת לוח וקבלת קישור אחד</button></div><div class="card"><h2>כניסה ללוח קיים</h2><p>אם כבר קיבלתם קישור או Family ID, הדביקו אותו כאן.</p><input id="joinBoardInput" placeholder="הדבקת קישור או Family ID" dir="ltr"><button type="button" class="bigBtn green" onclick="joinBoard()">כניסה ללוח</button></div></div><div class="small">אם יודעים לפתוח קישור מוואטסאפ — יודעים להשתמש בזה. אותו קישור עובד בטאבלט ובמחשב.</div></div></main>`;
}
function appShell(){
  const board=currentBoard();
  const mode=currentMode();
  const tab=currentTab();
  return `<div class="shell"><header class="topbar"><div class="toprow"><div class="brand">🧩 השעון המשפחתי <span class="badge">${board}</span></div><div class="tabs"><button type="button" class="btn ${mode==="patient"?"active":""}" onclick="hardOpenPatient()">👁️ שעון המטופל/ת</button><button type="button" class="btn ${mode==="backoffice"&&!tab?"active":""}" onclick="hardOpenBackoffice()">⚙️ ניהול</button><button type="button" class="btn voice ${tab==="voice"?"active":""}" onclick="hardOpenVoice()">🎙️ קול משפחתי</button><button type="button" class="btn soft" onclick="copyOneLink()">🔗 העתקת הקישור</button><button type="button" class="btn soft" onclick="sendWhatsappInvite()">📲 שליחה בוואטסאפ</button></div></div></header><main><iframe id="screenFrame" src="${frameSrc(mode,board,tab)}" title="השעון המשפחתי"></iframe></main></div>`;
}
function showHomeHelp(){
  if(localStorage.getItem(HOME_HELP_KEY))return;
  const div=document.createElement("div");
  div.className="homeHelp";
  div.innerHTML=`<div class="homeHelpBox"><h2>להפוך את זה לשעון במסך מלא</h2><p>לא צריך להוריד דף משפחתי. אפשר פשוט להוסיף את הקישור למסך הבית, כדי שייפתח נקי וברור כמו שעון קיר.</p><div class="homeHelpGrid"><div class="homeHelpCard"><div class="homeHelpIcon">📤</div><strong>באייפון / אייפד</strong><span>לחצו על כפתור השיתוף ואז “הוסף למסך הבית”.</span></div><div class="homeHelpCard"><div class="homeHelpIcon">⋮</div><strong>באנדרואיד / Chrome</strong><span>לחצו על תפריט שלוש הנקודות ואז “הוסף למסך הבית”.</span></div></div><button type="button" class="bigBtn" id="homeHelpOk">הבנתי, להמשיך</button></div>`;
  document.body.appendChild(div);
  document.getElementById("homeHelpOk").onclick=()=>{localStorage.setItem(HOME_HELP_KEY,"1");div.remove()};
}
function render(){
  const board=currentBoard();
  document.getElementById("app").innerHTML=board?appShell():portal();
}
window.addEventListener("popstate",render);
render();
setTimeout(showHomeHelp,900);
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
